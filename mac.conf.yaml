- defaults:
    link:
      create: true
      relink: true

- clean: ["~"]

- link:
    ~/.Brewfile: mac/Brewfile
    ~/.zshrc: mac/zsh/zshrc
    ~/.aerospace.toml: mac/aerospace.toml
    ~/.config/zsh/config.d/:
      glob: true
      clean: true
      path: mac/zsh/config.d/*
    ~/.config/borders/bordersrc:
      path: mac/borders/bordersrc
    ? "~/Library/Application
      Support/VSCodium/User/globalStorage/zokugun.sync-settings/settings.yml"
    : path: mac/vscode/sync-settings.yml
      force: true
